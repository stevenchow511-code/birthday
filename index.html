<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Special Girl 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top,#ff9a9e,#fad0c4,#fbc2eb);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* Envelope Screen */
.envelope-screen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:20;
  flex-direction:column;
}

.envelope{
  font-size:70px;
  cursor:pointer;
  transition:0.5s;
}

.envelope:hover{
  transform:scale(1.2) rotate(5deg);
}

.container{
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  padding:30px 20px;
  border-radius:30px;
  width:90%;
  max-width:420px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
  display:none;
}

h1{
  font-family:'Playfair Display',serif;
}

img{
  width:100%;
  border-radius:25px;
  margin:15px 0;
  opacity:0;
  transform:scale(0.8);
  transition:1.5s;
}

img.show{
  opacity:1;
  transform:scale(1);
}

.typing{
  font-size:14px;
  min-height:60px;
  margin-bottom:15px;
}

.countdown{
  font-size:13px;
  margin-bottom:10px;
}

.gift{
  font-size:50px;
  cursor:pointer;
  transition:0.5s;
}

.gift.open{
  transform:rotate(15deg) scale(1.2);
}

.secret-message{
  margin-top:10px;
  font-size:14px;
  opacity:0;
  transition:1s;
}

.secret-message.show{
  opacity:1;
}

.wa-btn{
  background:#25D366;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
  margin-top:10px;
}

.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
  from{opacity:0.2;}
  to{opacity:1;}
}
</style>
</head>
<body>

<div class="envelope-screen" id="envelopeScreen">
  <div class="envelope" onclick="openLetter()">💌</div>
  <p>Tap amplopnya ya 💖</p>
</div>

<div class="container" id="mainContent">
  <h1>Happy Birthday 💕</h1>
  <div class="countdown" id="countdown"></div>
  <img id="photo" src="https://i.ibb.co/2YQZ1Yp/girl-birthday.jpg">
  <div class="typing" id="typingText"></div>

  <div class="gift" id="gift" onclick="openGift()">🎁</div>
  <div class="secret-message" id="secretMessage">
    Aku tunggu kamu claim kadonya ya 😘
    <br>
    <button class="wa-btn" onclick="openWhatsApp()">Chat Aku 💖</button>
  </div>
</div>

<audio id="music" loop>
  <source src="romantic_music.wav" type="audio/wav">
</audio>

<script>
const text="Hari ini adalah hari spesial kamu 💖 Semoga kamu selalu bahagia, dicintai, dan sukses selalu ✨";
let i=0;

function openLetter(){
  document.getElementById("envelopeScreen").style.display="none";
  document.getElementById("mainContent").style.display="block";

  const music=document.getElementById("music");
  music.play().catch(()=>{});

  document.getElementById("photo").classList.add("show");
  typeWriter();
  createStars();
  startCountdown();
}

function typeWriter(){
  if(i<text.length){
    document.getElementById("typingText").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typeWriter,40);
  }
}

function openGift(){
  document.getElementById("gift").classList.add("open");
  document.getElementById("secretMessage").classList.add("show");
}

function openWhatsApp(){
  let wa="6281234567890";
  let message="Aku mau kadonya sekarang 😘🎁💖";
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(message)}`,"_blank");
}

function createStars(){
  for(let i=0;i<40;i++){
    let star=document.createElement("div");
    star.classList.add("star");
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";
    star.style.animationDuration=(Math.random()*2+1)+"s";
    document.body.appendChild(star);
  }
}

function startCountdown(){
  let target=new Date();
  target.setFullYear(target.getFullYear()+1);
  setInterval(()=>{
    let now=new Date().getTime();
    let distance=target-now;
    let days=Math.floor(distance/(1000*60*60*24));
    document.getElementById("countdown").innerHTML="Menuju ulang tahun berikutnya: "+days+" hari 💖";
  },1000);
}
</script>

</body>
</html>
