<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#ffdde1);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  overflow:hidden;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Envelope */
.envelope-screen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:20;
}

.envelope{
  font-size:70px;
  cursor:pointer;
  transition:0.4s;
}

.envelope:hover{
  transform:scale(1.15) rotate(6deg);
}

/* Main Card */
.container{
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  padding:30px 20px;
  border-radius:30px;
  width:90%;
  max-width:420px;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
  display:none;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:28px;
  margin-bottom:10px;
  animation:titleGlow 3s ease-in-out infinite alternate;
}

@keyframes titleGlow{
  from{ text-shadow:0 0 8px rgba(255,255,255,0.6); }
  to{ text-shadow:0 0 18px rgba(255,78,136,0.7); }
}

.slideshow img{
  width:100%;
  border-radius:20px;
  margin:15px 0;
  display:none;
}

.slideshow img.active{
  display:block;
}

/* ✨ Elegant Animated Neon Text */
.typing{
  font-size:16px;
  min-height:80px;
  margin-bottom:15px;
  font-weight:500;
  letter-spacing:0.5px;
  color:#ffffff;

  text-shadow:
    0 0 4px rgba(255,182,193,0.6),
    0 0 10px rgba(255,105,180,0.4);

  animation:elegantGlow 3s ease-in-out infinite alternate;
}

@keyframes elegantGlow{
  0%{
    text-shadow:
      0 0 3px rgba(255,182,193,0.4),
      0 0 6px rgba(255,105,180,0.3);
  }
  100%{
    text-shadow:
      0 0 6px rgba(255,182,193,0.8),
      0 0 14px rgba(255,105,180,0.6);
  }
}

.gift{
  font-size:50px;
  cursor:pointer;
  transition:0.4s;
}

.gift.open{
  transform:scale(1.25) rotate(10deg);
}

.secret-message{
  opacity:0;
  transition:1s;
}

.secret-message.show{
  opacity:1;
}

.wa-btn{
  background:#25D366;
  border:none;
  padding:10px 20px;
  border-radius:30px;
  color:white;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

.wa-btn:hover{
  transform:scale(1.05);
}

/* Falling Hearts */
.love{
  position:absolute;
  top:-20px;
  font-size:20px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{ transform:translateY(110vh); }
}
</style>
</head>

<body>

<div class="envelope-screen" id="envelopeScreen">
  <div class="envelope" onclick="openLetter()">💌</div>
  <p>Tap amplopnya ya dut 💖</p>
</div>

<div class="container" id="mainContent">
  <h1>Happy Birthday Dut 💕</h1>

  <div class="slideshow">
    <img src="https://i.ibb.co/9HCSsyCD/image.png" class="active">
    <img src="https://i.ibb.co/xRdb7Sk/image.png">
    <img src="https://i.ibb.co/fzCDjyYj/image.png">
  </div>

  <div class="typing" id="typingText"></div>

  <div class="gift" onclick="openGift()">🎁</div>

  <div class="secret-message" id="secretMessage">
    dih di klik ya dut , kado nya gatau nih apa langsung chat aja deh tuh wkwk 😘💖
    <br>
    <button class="wa-btn" onclick="openWhatsApp()">Chat Aku 💕</button>
  </div>
</div>

<script>
const text = "Hari ini bukan cuma hari lahirmu… Tapi hari di mana dunia diberkahi dengan seseorang yang begitu spesial 💕 Semoga cinta, tawa, dan kebahagiaan selalu memelukmu ya dut, salut sama kamu , you deserve to be happy dut 💕";
let i=0;

function openLetter(){
  document.getElementById("envelopeScreen").style.display="none";
  document.getElementById("mainContent").style.display="block";
  typeWriter();
  startSlideshow();
  createLoveRain();
}

function typeWriter(){
  if(i<text.length){
    document.getElementById("typingText").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typeWriter,35);
  }
}

function openGift(){
  document.querySelector(".gift").classList.add("open");
  document.getElementById("secretMessage").classList.add("show");
}

function openWhatsApp(){
  let wa="6281234567890"; 
  let message="Aku mau kadonya sekarang 😘🎁💖";
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(message)}`,"_blank");
}

function startSlideshow(){
  let slides=document.querySelectorAll(".slideshow img");
  let index=0;
  setInterval(()=>{
    slides[index].classList.remove("active");
    index=(index+1)%slides.length;
    slides[index].classList.add("active");
  },3000);
}

function createLoveRain(){
  setInterval(()=>{
    let love=document.createElement("div");
    love.classList.add("love");
    love.innerHTML="💖";
    love.style.left=Math.random()*100+"vw";
    love.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(love);
    setTimeout(()=>love.remove(),5000);
  },300);
}
</script>

</body>
</html>
